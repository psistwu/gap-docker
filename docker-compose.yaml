services:
  app:
    build:
      context: .
      args:
        BASE_IMAGE: ${BASE_IMAGE_NAME}:${BASE_IMAGE_TAG}
        GAP_VERSION: ${GAP_VERSION}
    environment:
      WORKDIR:
      JUPYTER_TOKEN:
    ports:
      - "8888:8888"
    image: ${IMAGE_NAME}:${GAP_VERSION}
    container_name: gap-app
    volumes:
      - ./workspace:${WORKDIR}
    working_dir: ${WORKDIR}
    command: jupyter lab --ip=0.0.0.0 --no-browser --allow-root
