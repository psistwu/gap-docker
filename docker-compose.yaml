services:
  app:
    build:
      context: .
      args:
        BASE_IMAGE: ${BASE_IMAGE_NAME}:${BASE_IMAGE_TAG}
        GAP_VERSION: ${GAP_VERSION}
    environment:
      WORKDIR:
      USER:
      USER_ID:
    image: ${IMAGE_NAME}:${GAP_VERSION}
    container_name: gap-app
    volumes:
      - ./start.sh:/opt/start.sh
      - ./workspace:${WORKDIR}
    working_dir: ${WORKDIR}
    command: sh /opt/start.sh
